    </div>
    
    <script>
      // Диагностика загрузки
      window.loadStart = Date.now();
      window.loadSteps = [];
      
      function logStep(step) {
        var time = Date.now() - window.loadStart;
        window.loadSteps.push(time + 'ms: ' + step);
        console.log('[LOAD]', time + 'ms:', step);
        
        var status = document.getElementById('load-status');
        var debug = document.getElementById('load-debug');
        var bar = document.getElementById('load-bar');
        
        if (status) status.textContent = step;
        if (debug) debug.textContent = window.loadSteps.slice(-3).join(' → ');
        
        // Прогресс бар
        if (bar) {
          var progress = Math.min(90, window.loadSteps.length * 15);
          bar.style.width = progress + '%';
        }
      }
      
      logStep('HTML parsed');
      
      // Скрываем загрузчик когда React загрузится
      window.hideLoader = function() {
        var loader = document.getElementById('initial-loader');
        if (loader) {
          var bar = document.getElementById('load-bar');
          if (bar) bar.style.width = '100%';
          setTimeout(function() {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.3s';
            setTimeout(function() { loader.remove(); }, 300);
          }, 200);
        }
      };
      
      // Таймаут на случай если что-то зависнет
      setTimeout(function() {
        var loader = document.getElementById('initial-loader');
        if (loader) {
          var debug = document.getElementById('load-debug');
          var status = document.getElementById('load-status');
          if (debug) {
            debug.style.color = '#ff6b6b';
            debug.textContent = 'Загрузка занимает много времени. Шаги: ' + window.loadSteps.join(' → ');
          }
          if (status) {
            status.innerHTML = 'Медленное соединение... <button onclick="location.reload()" style="margin-left:8px;padding:4px 12px;background:#00D9FF;border:none;border-radius:4px;color:#000;cursor:pointer;">Обновить</button>';
          }
        }
      }, 8000);
      
      // Критический таймаут - перезагрузка
      setTimeout(function() {
        var loader = document.getElementById('initial-loader');
        if (loader) {
          var status = document.getElementById('load-status');
          if (status) {
            status.innerHTML = '<div style="text-align:center;"><div style="color:#ff6b6b;margin-bottom:12px;">Не удалось загрузить приложение</div><button onclick="location.reload()" style="padding:8px 20px;background:#00D9FF;border:none;border-radius:6px;color:#000;cursor:pointer;font-weight:500;">Попробовать снова</button></div>';

    </script>
